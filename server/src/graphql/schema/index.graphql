scalar DateTime

enum UserRole {
  super_admin
  user
}

enum ContactStatus {
  new
  contacted
  interested
  follow_up
  converted
  lost
}

enum InteractionType {
  call
  whatsapp
  sms
  meeting
  property_viewing
  physical_visit
}

enum FollowUpStatus {
  pending
  completed
  overdue
}

enum SharePermission {
  view
  report
  edit
}

type NotificationSettings {
  emailAlerts: Boolean!
  followUpReminders: Boolean!
  weeklyDigest: Boolean!
  sharedListUpdates: Boolean!
}

type User {
  id: ID!
  fullName: String!
  email: String!
  phone: String
  agency: String
  role: UserRole!
  profileImage: String
  notificationSettings: NotificationSettings!
  mustChangePassword: Boolean!
  isActive: Boolean!
  lastLoginAt: DateTime
  mfaEnabled: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type AuthPayload {
  user: User!
  mustChangePassword: Boolean!
}

type SessionPayload {
  success: Boolean!
}

type MessagePayload {
  success: Boolean!
  message: String!
}

enum ExportFormat {
  csv
  excel
  pdf
}

input ExportContactsInput {
  search: String
  dateFrom: String
  dateTo: String
}

input ExportReportInput {
  format: ExportFormat!
  period: String!
  dateFrom: String!
  dateTo: String!
}

type ExportPayload {
  filename: String!
  mimeType: String!
  content: String!
  recordCount: Int!
  reportData: JSON
}

type Contact {
  id: ID!
  ownerId: ID!
  fullName: String!
  phone: String!
  email: String!
  propertyInterest: String!
  budgetRange: String!
  preferredLocation: String!
  leadSource: String!
  notes: String!
  status: ContactStatus!
  lastInteractionDate: DateTime
  nextFollowUpDate: DateTime
  isConverted: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type ContactDuplicateInfo {
  isDuplicate: Boolean!
  matchedField: String
  message: String
  code: String
  duplicateOwnerId: ID
  duplicateOwnerEmail: String
  duplicateOwnerName: String
}

type Interaction {
  id: ID!
  contactId: ID!
  ownerId: ID!
  interactionType: InteractionType!
  notes: String!
  outcome: String!
  nextFollowUpDate: DateTime
  createdAt: DateTime!
}

type FollowUp {
  id: ID!
  ownerId: ID!
  contactId: ID!
  scheduledDate: DateTime!
  status: FollowUpStatus!
  notes: String!
  completedAt: DateTime
  createdAt: DateTime!
}

type SharedAccess {
  id: ID!
  contactId: ID!
  ownerId: ID!
  sharedUserId: ID!
  permission: SharePermission!
  sharedUser: User
  contact: Contact
  createdAt: DateTime!
}

type DailyReport {
  date: DateTime!
  contactsAdded: Int!
  interactionsCompleted: Int!
  convertedClients: Int!
  followUpsCompleted: Int!
}

type MonthlyReport {
  month: String!
  year: Int!
  totalContacts: Int!
  totalInteractions: Int!
  conversionPercentage: Float!
  activeFollowUps: Int!
}

type ConversionRateReport {
  rate: Float!
  converted: Int!
  total: Int!
  periodStart: DateTime!
  periodEnd: DateTime!
}

type AdminUserRow {
  id: ID!
  fullName: String!
  email: String!
  role: UserRole!
  isActive: Boolean!
  createdAt: DateTime!
  lastLoginAt: DateTime
}

type AdminContactRow {
  id: ID!
  ownerName: String!
  ownerEmail: String!
  contactName: String!
  phone: String!
  status: ContactStatus!
  createdAt: DateTime!
}

type AuditLogEntry {
  id: ID!
  action: String!
  entityType: String!
  entityId: ID
  performedBy: ID
  performedByRole: UserRole
  ownerId: ID
  ipAddress: String
  userAgent: String
  metadata: JSON
  timestamp: DateTime!
}

type PaginatedContacts {
  items: [Contact!]!
  total: Int!
  page: Int!
  pageSize: Int!
  totalPages: Int!
}

type PaginatedUsers {
  items: [AdminUserRow!]!
  total: Int!
  page: Int!
  pageSize: Int!
  totalPages: Int!
}

type PaginatedAdminContacts {
  items: [AdminContactRow!]!
  total: Int!
  page: Int!
  pageSize: Int!
  totalPages: Int!
}

type PaginatedAuditLogs {
  items: [AuditLogEntry!]!
  total: Int!
  page: Int!
  pageSize: Int!
  totalPages: Int!
}

scalar JSON

input LoginInput {
  email: String!
  password: String!
  remember: Boolean
}

input ChangePasswordInput {
  currentPassword: String!
  newPassword: String!
}

input RequestPasswordResetInput {
  email: String!
}

input ResetPasswordInput {
  email: String!
  code: String!
  newPassword: String!
}

input NotificationSettingsInput {
  emailAlerts: Boolean
  followUpReminders: Boolean
  weeklyDigest: Boolean
  sharedListUpdates: Boolean
}

input UpdateProfileInput {
  fullName: String
  phone: String
  agency: String
  notificationSettings: NotificationSettingsInput
}

input CreateUserInput {
  fullName: String!
  email: String!
  password: String!
}

input ContactInput {
  fullName: String!
  phone: String
  email: String
  propertyInterest: String
  budgetRange: String
  preferredLocation: String
  leadSource: String
  notes: String
  status: ContactStatus
  nextFollowUpDate: DateTime
}

input ContactUpdateInput {
  fullName: String
  phone: String
  email: String
  propertyInterest: String
  budgetRange: String
  preferredLocation: String
  leadSource: String
  notes: String
  status: ContactStatus
  nextFollowUpDate: DateTime
}

input InteractionInput {
  contactId: ID!
  interactionType: InteractionType!
  notes: String
  outcome: String
  nextFollowUpDate: DateTime
}

input InteractionUpdateInput {
  interactionType: InteractionType
  notes: String
  outcome: String
  nextFollowUpDate: DateTime
}

input FollowUpInput {
  contactId: ID!
  scheduledDate: DateTime!
  notes: String
}

input ShareInput {
  contactId: ID!
  sharedUserId: ID!
  permission: SharePermission!
}

input AuditLogFilterInput {
  action: String
  entityType: String
  search: String
  performedBy: ID
  from: DateTime
  to: DateTime
  page: Int
  pageSize: Int
}

type Query {
  me: User
  myContacts(search: String, page: Int, pageSize: Int): PaginatedContacts!
  reportableContacts: [Contact!]!
  checkContactDuplicate(phone: String, email: String, excludeContactId: ID): ContactDuplicateInfo!
  contact(id: ID!): Contact
  sharedContacts: [Contact!]!
  interactions(contactId: ID): [Interaction!]!
  interactionHistory(contactId: ID!): [Interaction!]!
  todayFollowUps: [FollowUp!]!
  overdueFollowUps: [FollowUp!]!
  upcomingFollowUps(days: Int): [FollowUp!]!
  dailyReport(date: DateTime): DailyReport!
  monthlyReport(year: Int, month: Int): MonthlyReport!
  conversionRate(from: DateTime, to: DateTime): ConversionRateReport!
  sharedUsers: [SharedAccess!]!
  adminUsers(page: Int, pageSize: Int): PaginatedUsers!
  adminContacts(page: Int, pageSize: Int): PaginatedAdminContacts!
  auditLogs(filter: AuditLogFilterInput): PaginatedAuditLogs!
}

type Mutation {
  login(input: LoginInput!): AuthPayload!
  logout: Boolean!
  refreshSession: SessionPayload!
  changePassword(input: ChangePasswordInput!): AuthPayload!
  requestPasswordReset(input: RequestPasswordResetInput!): MessagePayload!
  resetPassword(input: ResetPasswordInput!): MessagePayload!
  updateProfile(input: UpdateProfileInput!): User!
  createUser(input: CreateUserInput!): User!
  setUserActive(userId: ID!, isActive: Boolean!): User!
  createContact(input: ContactInput!): Contact!
  updateContact(id: ID!, input: ContactUpdateInput!): Contact!
  deleteContact(id: ID!): Boolean!
  shareContact(contactId: ID!, sharedUserId: ID!, permission: SharePermission!): SharedAccess!
  logInteraction(input: InteractionInput!): Interaction!
  updateInteraction(id: ID!, input: InteractionUpdateInput!): Interaction!
  createFollowUp(input: FollowUpInput!): FollowUp!
  completeFollowUp(id: ID!): FollowUp!
  rescheduleFollowUp(id: ID!, scheduledDate: DateTime!): FollowUp!
  grantAccess(input: ShareInput!): SharedAccess!
  revokeAccess(contactId: ID!, sharedUserId: ID!): Boolean!
  exportContacts(input: ExportContactsInput!): ExportPayload!
  exportReport(input: ExportReportInput!): ExportPayload!
}
